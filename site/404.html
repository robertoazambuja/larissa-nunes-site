<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página não encontrada — Larissa Nunes Psicopedagoga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #f9f3fc 0%, #fff 50%, #fdf0f4 100%);
      color: #3d3548;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    .logo {
      font-family: 'Dancing Script', cursive;
      font-size: 3rem;
      color: #b48ec5;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6b5f78; margin-bottom: 2rem; }
    a {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #b48ec5;
      color: white;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.3s;
    }
    a:hover { background: #9a6faf; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">LN</div>
    <h1>Página não encontrada</h1>
    <p>A página que você procura não existe ou foi movida.</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
